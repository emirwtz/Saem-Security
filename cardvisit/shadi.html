<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/png" href="../logo.png">
<title>SAEM Security</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Kufi+Arabic:wght@500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          navy: { DEFAULT: '#0A0A14', panel: '#131322', line: '#242238' },
          paper: { DEFAULT: '#F5F3FB', panel: '#FFFFFF', line: '#E3DFF3' },
          brand: { 500: '#6C5CE7', 400: '#8B7CF5', 300: '#B7ACF9' },
          accent: { 400: '#C77DFF', 300: '#E0B8FF' }
        },
        fontFamily: {
          display: ['"Space Grotesk"', 'sans-serif'],
          displayAr: ['"Noto Kufi Arabic"', 'sans-serif'],
          body: ['Inter', 'sans-serif'],
          bodyAr: ['"Noto Kufi Arabic"', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace']
        },
        boxShadow: {
          glow: '0 0 40px -8px rgba(108,92,231,0.55)'
        }
      }
    }
  };
</script>
<style>
  html {
    scroll-behavior: smooth;
  }

  body {
    transition: background-color .35s ease, color .35s ease;
  }

  .card-radar {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 0;
    pointer-events: none;
    top: -40px;
    height: 220px;
  }

  .card-radar-ring {
    position: absolute;
    border-radius: 9999px;
    border: 1px solid rgba(108, 92, 231, 0.22);
  }

  .card-radar-ring.r1 {
    width: 210px;
    height: 210px;
  }

  .card-radar-ring.r2 {
    width: 270px;
    height: 270px;
    border-color: rgba(199, 125, 255, 0.16);
  }

  .card-radar-ring.r3 {
    width: 330px;
    height: 330px;
    border-color: rgba(108, 92, 231, 0.10);
    animation: card-pulse 3.2s ease-in-out infinite;
  }

  @keyframes card-pulse {
    0%, 100% { opacity: .5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.04); }
  }

  .avatar-ring {
    background: linear-gradient(135deg, #6C5CE7, #C77DFF);
    padding: 3px;
    border-radius: 9999px;
  }

  .avatar-inner {
    border-radius: 9999px;
    overflow: hidden;
    background: #0D1526;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 9999px;
    background: #34D399;
    box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.18);
  }

  .terminal-caret::after {
    content: '▍';
    color: #C77DFF;
    animation: caret 1s step-start infinite;
  }

  @keyframes caret {
    50% { opacity: 0; }
  }

  .terminal-link {
    color: inherit;
    text-decoration: none;
  }

  .terminal-link:hover {
    color: #C77DFF;
    text-decoration: underline;
  }

  ::selection {
    background: #6C5CE7;
    color: white;
  }

  a:focus-visible,
  button:focus-visible {
    outline: 2px solid #C77DFF;
    outline-offset: 2px;
  }

  #mobileNav {
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease;
  }

  #mobileNav.open {
    max-height: 420px;
  }

  @media (prefers-reduced-motion: reduce) {
    .card-radar-ring.r3,
    .terminal-caret::after {
      animation: none !important;
    }
  }
</style>
</head>

<script>
(function () {
  const STORAGE_LANG_KEY = 'saem_lang';
  const STORAGE_THEME_KEY = 'saem_theme';

  const NOT_FOUND = {
    ar: 'لم يتم العثور على عضو الفريق: ',
    tr: 'Ekip üyesi bulunamadı: ',
    en: 'Team member not found: '
  };

  const STATIC = {
    field: {
      ar: { email: 'البريد', location: 'الموقع', phone: 'الهاتف', status: 'الحالة', status_value: 'موثّق ✔', whatsapp: 'تواصل عبر واتساب', email_btn: 'تواصل عبر الإيميل', phone_btn: 'تواصل عبر الهاتف', logoAlt: 'شعار SAEM Security', themeToggle: 'تبديل الوضع الداكن / الفاتح' },
      tr: { email: 'e-posta', location: 'konum', phone: 'telefon', status: 'durum', status_value: 'doğrulandı ✔', whatsapp: 'WhatsApp ile Ulaşın', email_btn: 'E-posta ile Ulaşın', phone_btn: 'Telefon ile Ulaşın', logoAlt: 'SAEM Security Logosu', themeToggle: 'Karanlık / aydınlık mod arasında geçiş yap' },
      en: { email: 'email', location: 'location', phone: 'phone', status: 'status', status_value: 'verified ✔', whatsapp: 'Contact on WhatsApp', email_btn: 'Contact by Email', phone_btn: 'Contact by Phone', logoAlt: 'SAEM Security Logo', themeToggle: 'Toggle dark / light mode' }
    },
    footer: {
      ar: '© 2026 SAEM Security. جميع الحقوق محفوظة.',
      tr: '© 2026 SAEM Security. Tüm hakları saklıdır.',
      en: '© 2026 SAEM Security. All rights reserved.'
    },
    dirMap: { ar: 'rtl', tr: 'ltr', en: 'ltr' },
    langMap: { ar: 'ar', tr: 'tr', en: 'en' },
    nav: {
      ar: { home: 'الرئيسية', about: 'من نحن', services: 'خدماتنا', locations: 'مواقعنا', contact: 'تواصل معنا', privacy: 'الخصوصية' },
      tr: { home: 'Ana Sayfa', about: 'Hakkımızda', services: 'Hizmetler', locations: 'Konumlarımız', contact: 'İletişim', privacy: 'Gizlilik' },
      en: { home: 'Home', about: 'About', services: 'Services', locations: 'Locations', contact: 'Contact', privacy: 'Privacy' }
    }
  };

  // Base URL of each language subsite. The homepage lives at the domain
  // root, TR/AR live under /tr/ and /ar/. Nav links must point into the
  // matching subsite, not always back to the English root.
  const SITE_BASE = { en: 'https://saemsecurity.com', tr: 'https://saemsecurity.com/tr', ar: 'https://saemsecurity.com/ar' };
  const NAV_PATH = { home: '/#hero', about: '/#about', services: '/#services', locations: '/#locations', contact: '/#contact', privacy: '/privacy.html' };

  const GEO_CACHE_KEY = 'saem_geo_cache';
  const BOT_UA_REGEX = /bot|crawl|spider|slurp|mediapartners|facebookexternalhit|whatsapp|telegrambot|preview|lighthouse|pagespeed/i;

  function isBot() {
    return BOT_UA_REGEX.test(navigator.userAgent || '');
  }

  function safeSessionGet(key) {
    try { return sessionStorage.getItem(key); } catch (e) { return null; }
  }

  function safeSessionSet(key, value) {
    try { sessionStorage.setItem(key, value); } catch (e) {  }
  }

  function countryToLang(code) {
    if (code === 'SY') return 'ar';
    if (code === 'TR') return 'tr';
    return 'en';
  }

  function fetchWithTimeout(url, ms) {
    return Promise.race([
      fetch(url),
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
    ]);
  }

  // Resolves the language to render on first load, mirroring the homepage's
  // own logic: an explicit stored preference always wins; otherwise the
  // visitor's country decides (Syria -> ar, Turkey -> tr, else -> en).
  // Defaults to English if geolocation fails or times out.
  function resolveInitialLanguage() {
    const stored = localStorage.getItem(STORAGE_LANG_KEY);
    if (stored && STATIC.field[stored]) return Promise.resolve(stored);

    if (isBot()) return Promise.resolve('en');

    const cached = safeSessionGet(GEO_CACHE_KEY);
    if (cached) {
      try {
        const data = JSON.parse(cached);
        return Promise.resolve(countryToLang(data.country_code));
      } catch (e) {  }
    }

    return fetchWithTimeout('https://ipwho.is/', 4000)
      .then((res) => res.json())
      .then((data) => {
        const success = data && data.success !== false;
        if (success) safeSessionSet(GEO_CACHE_KEY, JSON.stringify(data));
        return countryToLang(success ? data.country_code : null);
      })
      .catch(() => 'en');
  }

  const params = new URLSearchParams(window.location.search);
  const filenameId = window.location.pathname.split('/').pop().replace(/\.html?$/i, '');
  const memberId = params.get('id') || filenameId;
  const member = TEAM[memberId];

  if (!member) {
    const storedLang = localStorage.getItem(STORAGE_LANG_KEY);
    const browserLang = (navigator.language || '').slice(0, 2);
    const notFoundLang = NOT_FOUND[storedLang] ? storedLang : (NOT_FOUND[browserLang] ? browserLang : 'en');
    document.body.innerHTML =
      '<div style="padding:2rem;text-align:center;font-family:sans-serif">' +
      NOT_FOUND[notFoundLang] + '<b>' + (memberId || '') + '</b>' +
      '</div>';
    document.body.classList.remove('opacity-0');
    return;
  }

  document.title = member.name + ' — SAEM Security';

  const root = document.documentElement;
  const body = document.body;
  const langButtons = document.querySelectorAll('.lang-btn');
  const themeToggleBtn = document.getElementById('themeToggle');
  const avatarImg = document.getElementById('avatarImg');
  const nameLabelEl = document.getElementById('nameLabel');
  const roleLabelEl = document.getElementById('roleLabel');
  const footerRightsEl = document.getElementById('footerRights');
  const cardTerminalEl = document.getElementById('cardTerminal');
  const whatsappBtn = document.getElementById('whatsappBtn');
  const whatsappLabel = document.getElementById('whatsappLabel');
  const emailBtn = document.getElementById('emailBtn');
  const emailLabel = document.getElementById('emailLabel');
  const phoneBtn = document.getElementById('phoneBtn');
  const phoneLabel = document.getElementById('phoneLabel');

  const menuToggleBtn = document.getElementById('menuToggle');
  const mobileNav = document.getElementById('mobileNav');
  const iconBurger = document.getElementById('iconBurger');
  const iconClose = document.getElementById('iconClose');

  avatarImg.src = member.avatar;
  avatarImg.alt = member.name;
  nameLabelEl.textContent = member.name;

  function applyLanguage(lang) {
    const field = STATIC.field[lang];
    if (!field) return;

    localStorage.setItem(STORAGE_LANG_KEY, lang);
    root.setAttribute('lang', STATIC.langMap[lang]);
    root.setAttribute('dir', STATIC.dirMap[lang]);
    body.classList.toggle('font-bodyAr', lang === 'ar');
    document.querySelectorAll('.font-display').forEach((el) => {
      el.classList.toggle('font-displayAr', lang === 'ar');
    });

    roleLabelEl.textContent = member.role[lang];
    footerRightsEl.textContent = STATIC.footer[lang];
    const navLabels = STATIC.nav[lang];
    const base = SITE_BASE[lang];
    document.querySelectorAll('[data-nav]').forEach((el) => {
      const key = el.getAttribute('data-nav');
      el.textContent = navLabels[key];
      el.href = base + NAV_PATH[key];
    });
    const logoLinkEl = document.getElementById('logoLink');
    if (logoLinkEl) logoLinkEl.href = lang === 'en' ? base : base + '/';
    document.querySelectorAll('[data-i18n-alt]').forEach((el) => el.setAttribute('alt', field.logoAlt));
    document.querySelectorAll('[data-i18n-aria]').forEach((el) => el.setAttribute('aria-label', field.themeToggle));
    whatsappLabel.textContent = field.whatsapp;
    whatsappBtn.href = member.whatsapp;

    emailLabel.textContent = field.email_btn;
    emailBtn.href = `mailto:${member.email}`;

    phoneLabel.textContent = field.phone_btn;
    phoneBtn.href = `tel:+${member.phone}`;

    cardTerminalEl.innerHTML =
      `<div>&gt; <bdi>${field.email}</bdi> <a class="terminal-link" dir="ltr" href="mailto:${member.email}">${member.email}</a></div>` +
      `<div>&gt; <bdi>${field.phone}</bdi> <a class="terminal-link" dir="ltr" href="tel:+${member.phone}">${member.phoneDisplay}</a></div>` +
      `<div>&gt; <bdi>${field.location}</bdi> <bdi class="text-[#0B1220] dark:text-[#E7EDFB]">${member.location[lang]}</bdi></div>` +
      `<div>&gt; <bdi>${field.status}</bdi> <span class="text-[#34D399]">${field.status_value}</span><span class="terminal-caret"></span></div>`;

    langButtons.forEach((btn) => {
      const isActive = btn.getAttribute('data-lang') === lang;
      btn.classList.toggle('bg-brand-500', isActive);
      btn.classList.toggle('text-white', isActive);
      btn.classList.toggle('text-[#5B667E]', !isActive);
      btn.classList.toggle('dark:text-[#7C8AB0]', !isActive);
      if (isActive) btn.setAttribute('aria-current', 'page');
      else btn.removeAttribute('aria-current');
    });
  }

  function applyTheme(theme) {
    root.classList.toggle('dark', theme === 'dark');
    localStorage.setItem(STORAGE_THEME_KEY, theme);
  }

  function closeMobileNav() {
    if(!mobileNav) return;
    mobileNav.classList.remove('open');
    menuToggleBtn.setAttribute('aria-expanded', 'false');
    if(iconBurger) iconBurger.classList.remove('hidden');
    if(iconClose) iconClose.classList.add('hidden');
  }

  document.addEventListener('DOMContentLoaded', () => {
    applyTheme(localStorage.getItem(STORAGE_THEME_KEY) || 'dark');

    resolveInitialLanguage().then((lang) => {
      applyLanguage(lang);
      body.classList.remove('opacity-0');
    });

    langButtons.forEach((btn) => {
      btn.addEventListener('click', () => applyLanguage(btn.getAttribute('data-lang')));
    });

    themeToggleBtn.addEventListener('click', () => {
      applyTheme(root.classList.contains('dark') ? 'light' : 'dark');
    });

    if(menuToggleBtn) {
      menuToggleBtn.addEventListener('click', () => {
        const isOpen = mobileNav.classList.toggle('open');
        menuToggleBtn.setAttribute('aria-expanded', String(isOpen));
        if(iconBurger) iconBurger.classList.toggle('hidden', isOpen);
        if(iconClose) iconClose.classList.toggle('hidden', !isOpen);
      });
    }

    if(mobileNav) {
      mobileNav.querySelectorAll('[data-mobile-link]').forEach(link => {
        link.addEventListener('click', closeMobileNav);
      });
    }

    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768) closeMobileNav();
    });
  });
})();
</script>
</body>
</html>
